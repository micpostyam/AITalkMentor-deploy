services:
  frontend:
    image: ghcr.io/micpostyam/aitalkmentor-frontend:latest
    container_name: aitalkmentor-prod-frontend
    restart: unless-stopped
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aitalkmentor-prod-front.rule=Host(`aitalkmentor.fr`) || Host(`www.aitalkmentor.fr`) || Host(`aitalkmentor.com`) || Host(`www.aitalkmentor.com`)"
      - "traefik.http.routers.aitalkmentor-prod-front.entrypoints=websecure"
      - "traefik.http.routers.aitalkmentor-prod-front.tls.certresolver=letsencrypt"
      - "traefik.http.services.aitalkmentor-prod-front.loadbalancer.server.port=80"
      - "traefik.docker.network=aitalkmentor-prod_internal"

  backend:
    image: ghcr.io/micpostyam/aitalkmentor-backend:latest
    container_name: aitalkmentor-prod-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aitalkmentor-prod-api.rule=Host(`api.aitalkmentor.fr`)"
      - "traefik.http.routers.aitalkmentor-prod-api.entrypoints=websecure"
      - "traefik.http.routers.aitalkmentor-prod-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.aitalkmentor-prod-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=aitalkmentor-prod_internal"

  db:
    image: postgres:15-alpine
    container_name: aitalkmentor-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  backend-uploads:
  backend-logs:

networks:
  internal:
    driver: bridge
