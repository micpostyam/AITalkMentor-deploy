services:
  frontend:
    image: ghcr.io/OWNER/aitalkmentor-frontend:staging
    container_name: aitalkmentor-staging-frontend
    restart: unless-stopped
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aitalkmentor-staging-front.rule=Host(`staging.aitalkmentor.fr`)"
      - "traefik.http.routers.aitalkmentor-staging-front.entrypoints=websecure"
      - "traefik.http.routers.aitalkmentor-staging-front.tls.certresolver=letsencrypt"
      - "traefik.http.services.aitalkmentor-staging-front.loadbalancer.server.port=80"
      - "traefik.docker.network=aitalkmentor-staging_internal"

  backend:
    image: ghcr.io/OWNER/aitalkmentor-backend:staging
    container_name: aitalkmentor-staging-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aitalkmentor-staging-api.rule=Host(`api-staging.aitalkmentor.fr`)"
      - "traefik.http.routers.aitalkmentor-staging-api.entrypoints=websecure"
      - "traefik.http.routers.aitalkmentor-staging-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.aitalkmentor-staging-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=aitalkmentor-staging_internal"

  db:
    image: postgres:15-alpine
    container_name: aitalkmentor-staging-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aitalkmentor-staging-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres-data:
  backend-uploads:
  backend-logs:

networks:
  internal:
    driver: bridge
